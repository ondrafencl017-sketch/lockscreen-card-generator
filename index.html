<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lock Screen Business Card</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* SMAUT brand palette — #2D2927 dark / #5EDA9B primary green + SNT #7cc400 */
:root {
  --ground:   #1A1917;
  --surface:  #2D2927;
  --surface2: #3A3734;
  --border:   #4A4744;
  --text:     #EAE6DF;
  --muted:    #8B8481;
  --accent:   #5EDA9B;
  --accent-l: #7FE8B0;
  --r: 8px;
}

html, body {
  height: 100%;
  background: var(--ground);
  color: var(--text);
  font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 14px;
  overflow: hidden;
}

#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: 290px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.s-head {
  padding: 22px 22px 18px;
  border-bottom: 1px solid var(--border);
}
.s-head h1 { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }
.s-head p  { margin-top: 3px; font-size: 11px; color: var(--muted); }

.s-body {
  flex: 1;
  overflow-y: auto;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 26px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.s-foot {
  padding: 16px 22px;
  border-top: 1px solid var(--border);
}

/* ── Form ── */
.group { display: flex; flex-direction: column; gap: 12px; }

.glabel {
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--muted);
}
.glabel::before {
  content: '';
  display: block;
  width: 2px; height: 11px;
  background: var(--accent);
  border-radius: 1px;
  flex-shrink: 0;
}

.field { display: flex; flex-direction: column; gap: 5px; }
.field > span { font-size: 11px; font-weight: 500; color: var(--muted); }
.field input[type=text],
.field input[type=url] {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color .15s;
  width: 100%;
}
.field input:focus { border-color: var(--accent); }
.field input::placeholder { color: #5A5753; }

/* Logo */
#logo-file { display: none; }
#logo-area {
  height: 80px;
  border: 1.5px dashed var(--border);
  border-radius: var(--r);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--muted);
  transition: border-color .15s, background .15s;
}
#logo-area:hover { border-color: var(--accent); background: rgba(94,218,155,.06); color: var(--accent); }
#logo-prev { max-height: 54px; max-width: 200px; object-fit: contain; display: none; }
#logo-rm {
  background: none; border: none; cursor: pointer; padding: 0;
  font-family: inherit; font-size: 11px; color: #d05050; display: none;
}
#logo-rm:hover { text-decoration: underline; }

/* Themes */
.swatches {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.sw {
  aspect-ratio: 1;
  border-radius: 7px;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform .15s, border-color .15s;
  box-shadow: 0 1px 5px rgba(0,0,0,.5);
}
.sw:hover { transform: scale(1.12); }
.sw.on {
  border-color: var(--accent);
  box-shadow: 0 0 0 2.5px rgba(94,218,155,.3), 0 1px 5px rgba(0,0,0,.5);
}
#t-lbl { font-size: 10px; color: var(--muted); text-align: center; margin-top: 5px; }

/* Download */
#dl {
  width: 100%;
  padding: 14px 16px;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #1A1917;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .02em;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
#dl:hover:not(:disabled) { background: var(--accent-l); }
#dl:active:not(:disabled) { transform: scale(.98); }
#dl:disabled { opacity: .5; cursor: not-allowed; }

/* ── Preview ── */
#preview {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: auto;
  padding: 32px;
  position: relative;
}
#preview::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 55% 55% at 50% 54%, rgba(94,218,155,.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.pcaption {
  margin-top: 16px; font-size: 11px; color: var(--muted);
  letter-spacing: .03em; position: relative; z-index: 1;
}

/* ── Phone ── */
.phone {
  position: relative;
  background: #1C1A18;
  border-radius: 50px;
  padding: 13px;
  box-shadow:
    0 0 0 1.5px #3A3630,
    0 40px 100px rgba(0,0,0,.9),
    0 0 50px rgba(94,218,155,.04),
    inset 0 0 0 1px rgba(255,255,255,.03);
  z-index: 1;
}
.phone::before {
  content: '';
  position: absolute; right: -3px; top: 112px;
  width: 3px; height: 68px;
  background: #2C2A26; border-radius: 0 3px 3px 0;
  box-shadow: 0 84px 0 #2C2A26;
}
.phone::after {
  content: '';
  position: absolute; left: -3px; top: 94px;
  width: 3px; height: 44px;
  background: #2C2A26; border-radius: 3px 0 0 3px;
  box-shadow: 0 58px 0 #2C2A26, 0 112px 0 #2C2A26;
}
.p-island {
  position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
  width: 86px; height: 26px; background: #000; border-radius: 14px; z-index: 10;
}
.p-screen { width: 262px; border-radius: 38px; overflow: hidden; }

/* ── Lock screen ── */
#ls {
  width: 262px; height: 568px;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: background .35s ease;
}

.ls-mid {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 20px 20px; gap: 18px;
}
.ls-logo-bg {
  display: flex; align-items: center; justify-content: center;
}
#c-logo { max-height: 80px; max-width: 180px; object-fit: contain; display: block; }

.ls-text { text-align: center; display: flex; flex-direction: column; gap: 5px; }
#c-name  { font-size: 24px; font-weight: 700; letter-spacing: -.04em; line-height: 1.12; }
#c-job   { font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }

.ls-qr   { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.qr-bg   { background: #fff; border-radius: 10px; padding: 7px; }
#qr-box  { width: 108px; height: 108px; display: flex; align-items: center; justify-content: center; }
#qr-box canvas { display: block !important; }
.qr-ph   { font-size: 9px; color: #bbb; text-align: center; line-height: 1.5; }
#qr-lbl  { font-size: 9px; font-weight: 500; letter-spacing: .03em; }

/* ── Responsive ── */
@media (max-width: 660px) {
  html, body { overflow: auto; }
  #app { flex-direction: column; height: auto; }
  #sidebar { width: 100%; }
  .s-body { max-height: 55vh; }
  #preview { padding: 24px 16px 40px; overflow: visible; }
}

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; }
}
</style>
</head>
<body>
<div id="app">

<!-- Sidebar -->
<aside id="sidebar">
  <div class="s-head">
    <h1>Lock Screen Card</h1>
    <p>Digital business card for trade shows</p>
  </div>
  <div class="s-body">

    <div class="group">
      <div class="glabel">Contact</div>
      <div class="field">
        <span>Full name</span>
        <input id="i-name" type="text" placeholder="Jan Novák" autocomplete="off" />
      </div>
      <div class="field">
        <span>Job title</span>
        <input id="i-job" type="text" placeholder="Sales Manager" autocomplete="off" />
      </div>
      <div class="field">
        <span>LinkedIn URL</span>
        <input id="i-li" type="url" placeholder="https://linkedin.com/in/username" autocomplete="off" />
      </div>
    </div>

    <div class="group">
      <div class="glabel">Logo</div>
      <input type="file" id="logo-file" accept="image/*" />
      <div id="logo-area" onclick="document.getElementById('logo-file').click()">
        <img id="logo-prev" src="" alt="logo" />
        <span id="logo-txt">Click to upload logo</span>
      </div>
      <button id="logo-rm" onclick="rmLogo()">Remove logo</button>
      <label id="logo-white-wrap" style="display:none;align-items:center;gap:8px;cursor:pointer;font-size:11px;color:var(--muted)">
        <input type="checkbox" id="logo-white" onchange="toggleLogoWhite(this.checked)" style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer">
        Show white version
      </label>
    </div>

    <div class="group">
      <div class="glabel">Background</div>
      <div class="swatches" id="sw"></div>
      <div id="t-lbl">SMAUT</div>
    </div>

  </div>
  <div class="s-foot">
    <button id="dl" onclick="doDownload()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1v9M4.5 6.5 8 10l3.5-3.5M2 13h12" stroke="#1A1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Save as Lock Screen Image
    </button>
  </div>
</aside>

<!-- Preview -->
<main id="preview">
  <div class="phone">
    <div class="p-island"></div>
    <div class="p-screen">
      <div id="ls">
        <div class="ls-mid">
          <div class="ls-logo-bg" id="ls-lb" style="display:none">
            <img id="c-logo" src="" alt="logo" />
          </div>
          <div class="ls-text">
            <div id="c-name">Your Name</div>
            <div id="c-job">Job Title</div>
          </div>
          <div class="ls-qr">
            <div class="qr-bg">
              <div id="qr-box">
                <div class="qr-ph">Enter<br>LinkedIn URL</div>
              </div>
            </div>
            <div id="qr-lbl">Scan to connect on LinkedIn</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <p class="pcaption">Set this image as your phone&rsquo;s lock screen at trade shows</p>
</main>

</div>

  { id:'mid',   name:'Midnight',bg:'linear-gradient(160deg,#0f0c29,#302b63,#24243e)', c:'#ffffff', a:'#a78bfa', s:'#94a3b8' },
  { id:'emb',   name:'Ember',   bg:'linear-gradient(160deg,#1c0605,#7f1d1d,#991b1b)', c:'#ffffff', a:'#fca5a5', s:'#fcd34d' },
  { id:'slt',   name:'Slate',   bg:'linear-gradient(160deg,#0f172a,#1e293b,#334155)', c:'#ffffff', a:'#94a3b8', s:'#cbd5e1' },
  { id:'prl',   name:'Pearl',   bg:'linear-gradient(160deg,#f8fafc,#e8eae6,#f1f5f9)', c:'#2D2927', a:'#3A4B40', s:'#555960' },
]
let cur = THEMES[0], qrtmr = null

const swrap = document.getElementById('sw')
THEMES.forEach((t, i) => {
  const b = document.createElement('button')
  b.className = 'sw' + (i === 0 ? ' on' : '')
  b.style.background = t.bg
  b.title = t.name
  b.addEventListener('click', () => {
    document.querySelectorAll('.sw').forEach(x => x.classList.remove('on'))
    b.classList.add('on')
    cur = t
    document.getElementById('t-lbl').textContent = t.name
    paint()
  })
  swrap.appendChild(b)
})

function paint() {
  document.getElementById('ls').style.background = cur.bg
  document.getElementById('c-name').style.color  = cur.c
  document.getElementById('c-job').style.color   = cur.a
  document.getElementById('qr-lbl').style.color  = cur.s
}

/* ── Text inputs ── */
document.getElementById('i-name').addEventListener('input', e => {
  document.getElementById('c-name').textContent = e.target.value || 'Your Name'
})
document.getElementById('i-job').addEventListener('input', e => {
  document.getElementById('c-job').textContent = e.target.value || 'Job Title'
})
document.getElementById('i-li').addEventListener('input', e => {
  clearTimeout(qrtmr)
  qrtmr = setTimeout(() => buildQR(e.target.value.trim()), 550)
})

/* ── QR — inline qrcodejs library, zero network dependency ── */
function buildQR(url) {
  const box = document.getElementById('qr-box')
  box.innerHTML = ''
  if (!url) {
    box.innerHTML = '<div class="qr-ph">Enter<br>LinkedIn URL</div>'
    return
  }
  try {
    new QRCode(box, {
      text: url,
      width: 108,
      height: 108,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M,
    })
  } catch(e) {
    box.innerHTML = '<div class="qr-ph">QR error</div>'
    console.error(e)
  }
}

/* ── Logo ── */
document.getElementById('logo-file').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return
  const rd = new FileReader()
  rd.onload = ev => {
    const src = ev.target.result
    document.getElementById('logo-prev').src = src
    document.getElementById('logo-prev').style.display = 'block'
    document.getElementById('logo-txt').style.display  = 'none'
    document.getElementById('logo-rm').style.display   = 'block'
    document.getElementById('logo-white-wrap').style.display = 'flex'
    document.getElementById('c-logo').src = src
    document.getElementById('ls-lb').style.display = 'flex'
  }
  rd.readAsDataURL(f)
})
function rmLogo() {
  document.getElementById('logo-prev').src = ''
  document.getElementById('logo-prev').style.display = 'none'
  document.getElementById('logo-txt').style.display  = 'block'
  document.getElementById('logo-rm').style.display   = 'none'
  document.getElementById('logo-file').value = ''
  document.getElementById('ls-lb').style.display = 'none'
  document.getElementById('logo-white-wrap').style.display = 'none'
  document.getElementById('logo-white').checked = false
  document.getElementById('c-logo').style.filter = ''
}
function toggleLogoWhite(on) {
  document.getElementById('c-logo').style.filter = on ? 'brightness(0) invert(1)' : ''
}

/* ── Download ── */
async function doDownload() {
  const btn = document.getElementById('dl')
  btn.disabled = true
  btn.innerHTML = 'Generating&hellip;'
  try {
    const el = document.getElementById('ls')
    const canvas = await html2canvas(el, {
      scale: 4, useCORS: true, allowTaint: true, backgroundColor: null, logging: false,
    })
    const name = (document.getElementById('i-name').value.trim() || 'business-card')
      .toLowerCase().replace(/\s+/g, '-')
    const a = document.createElement('a')
    a.download = name + '-lock-screen.png'
    a.href = canvas.toDataURL('image/png')
    a.click()
  } catch (err) {
    console.error(err)
    alert('Export failed. Please try again.')
  } finally {
    btn.disabled = false
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4.5 6.5 8 10l3.5-3.5M2 13h12" stroke="#1A1917" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Save as Lock Screen Image'
  }
}

paint()
</script>
</body>
